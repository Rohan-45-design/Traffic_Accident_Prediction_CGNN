# CGNN Configuration - Phase 4
# Optimized for 5K samples

project:
  name: "Traffic_Accident_CGNN"
  version: "1.0"
  description: "Causal Graph Neural Network for Accident Prediction"

data:
  causal_variables: "data/processed/causal_variables_balanced_5k.csv"
  causal_relationships: "data/causal_graphs/causal_relationships.csv"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 42

model:
  input_dim: 6
  hidden_dim: 64              # ✅ Good for 5K samples
  output_dim: 2
  num_layers: 5               # ✅ Good depth
  num_attention_heads: 8     # ✅ FIXED (was 8)
  attention_dropout: 0.3
  message_passing_steps: 2    # ✅ FIXED (was 3)
  aggregation: "mean"
  activation: "relu"
  dropout: 0.3                # ✅ FIXED (was 0.4)
  use_batch_norm: true

training:
  batch_size: 32
  num_epochs: 20              # ✅ Good
  learning_rate: 0.003        # ✅ Good (was 0.01)
  weight_decay: 0.0001
  optimizer: "Adam"
  scheduler: "ReduceLROnPlateau"
  scheduler_patience: 5
  scheduler_factor: 0.5
  prediction_loss_weight: 1.0
  causal_consistency_loss_weight: 0.1  # ✅ Good (reduced)
  early_stopping_patience: 10
  min_delta: 0.001
  log_interval: 5
  save_interval: 10
  checkpoint_dir: "data/neural_models/checkpoints"

output:
  model_save_path: "data/neural_models/cgnn_best_model.pt"
  results_dir: "results/phase4"
  logs_dir: "data/neural_models/logs"
  plots_dir: "results/phase4/plots"

evaluation:
  metrics: ["accuracy", "f1", "precision", "recall", "confusion_matrix"]
  baseline_models: ["random_forest", "logistic_regression"]

device: "cpu"
